{% extends 'base.html' %}
{% block title %}Login - SupportDesk{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-lg border-0">
      <div class="card-header bg-primary text-white text-center py-4">
        <h3 class="mb-0 fw-bold"><i class="fas fa-sign-in-alt me-2"></i>Login</h3>
        <small>Welcome back to SupportDesk</small>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" name="remember" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>
        <hr>
        <p class="text-center mb-0">
          Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
