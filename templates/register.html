{% extends 'base.html' %}
{% block title %}Register - SupportDesk{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg border-0">
      <div class="card-header bg-success text-white text-center py-4">
        <h3 class="mb-0 fw-bold"><i class="fas fa-user-plus me-2"></i>Create Account</h3>
        <small>Join SupportDesk today</small>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Your name" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-bold py-2">
            <i class="fas fa-user-plus me-2"></i>Register
          </button>
        </form>
        <hr>
        <p class="text-center mb-0">
          Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-bold">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
