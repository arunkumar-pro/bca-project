services:
  - type: web
    name: arunkumar-support-portal-bca
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        value: arunkumar-bca-support-2024-secretkey
      - key: MONGO_URI
        fromDatabase:
          name: supportdesk-db
          property: connectionString
      - key: FLASK_ENV
        value: production
